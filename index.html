<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Orange NSW Wineries Map</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- mapLibre -->
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <div class="container-fluid py-4">
        <div class="mx-auto filterContainer">
            <div class="w-50 mx-auto blurred">
                <h3 class="mx-auto mb-3">Orange NSW Wineries</h3>



                <!-- Filter -->
                <select id="filter" class="form-select mb-3" id="filter">
                    <option value="All">All</option>
                    <option>Wine only</option>
                    <option>Wine and Cheese</option>
                    <option>Restaurant</option>
                    <option>Live Music</option>
                    <option>Family Friendly</option>
                    <option>Dog Friendly</option>
                    <option>Outdoor Area</option>
                </select>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Map creation -->
    <script type="module" src="./mapCreate.js"></script>

</body>

</html>
