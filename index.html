<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Orange NSW Wineries Map</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- mapLibre -->
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-4 sidebar">
                <div class="blurred">
                    <h3 class="mb-3">Orange NSW Wineries</h3>

                    <select id="filter" class="form-select mb-3">
                        <option value="All">All</option>
                        <option>Wine only</option>
                        <option>Wine and Cheese</option>
                        <option>Restaurant</option>
                        <option>Live Music</option>
                        <option>Family Friendly</option>
                        <option>Dog Friendly</option>
                        <option>Outdoor Area</option>
                    </select>

                    <div id="winery-list"></div>
                </div>
            </div>

            <!-- Map -->
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- Map creation -->
    <script type="module" src="./mapCreate.js"></script>

</body>

</html>
